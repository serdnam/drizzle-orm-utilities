services:
  postgres:
    image: postgres:17-alpine
    container_name: drizzle_playground_pg
    environment:
      POSTGRES_USER: drizzle
      POSTGRES_PASSWORD: drizzle
      POSTGRES_DB: playground
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drizzle -d playground"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
