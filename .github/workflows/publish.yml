name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.2.0)'
        required: true
        type: string
      tag:
        description: 'npm dist-tag'
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
          - beta

permissions:
  contents: write  # push commit + tag, create GitHub release
  id-token: write  # npm trusted publishing (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: drizzle
          POSTGRES_PASSWORD: drizzle
          POSTGRES_DB: playground
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm version ${{ inputs.version }} --no-git-tag-version

      - run: npm run build

      - run: npm run typecheck

      - run: npm run check

      - run: npm run db:migrate
        env:
          DATABASE_URL: postgres://drizzle:drizzle@localhost:5432/playground

      - run: npm test
        env:
          DATABASE_URL: postgres://drizzle:drizzle@localhost:5432/playground

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore: release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Publish to npm
        run: npm publish --access public --tag ${{ inputs.tag }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ inputs.version }}" \
            --title "v${{ inputs.version }}" \
            --generate-notes \
            ${{ inputs.tag != 'latest' && '--prerelease' || '' }}
